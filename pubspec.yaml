name: reta
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  dotted_border: ^3.1.0
  go_router: ^13.0.0
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  equatable: ^2.0.5
  image_picker: ^1.2.1
  flutter_svg: ^2.0.10
  intl: ^0.20.2
  flutter_screenutil: ^5.9.3
  persistent_bottom_nav_bar: any
  dropdown_button2: ^2.3.9
  file_picker: ^8.1.2
  uuid: ^4.5.3
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.2
  syncfusion_flutter_pdfviewer: ^33.1.45
  printing: ^5.12.0
  webview_flutter: ^4.8.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#035DAD"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Thin.ttf
          weight: 100
        - asset: assets/fonts/NotoSansArabic-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/NotoSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansArabic-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/NotoSansArabic-Black.ttf
          weight: 900

  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/banks/
    - assets/svg/